name: Deploy
on: [push]
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build config
        share:
          cfg:
            run: ./scripts/plan.sh
            json: true
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: ./deploy.sh ${{ share.cfg.env }} ${{ share.cfg.region }}
  notify:
    runs-on: ubuntu-latest
    steps:
      - run: echo "deployed to ${{ share.cfg.region }}"
