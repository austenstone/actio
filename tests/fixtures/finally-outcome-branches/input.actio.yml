name: CI
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: ./deploy.sh

finally:
  on-success:
    notify-success:
      runs-on: ubuntu-latest
      steps:
        - run: ./notify-ok.sh
  on-failure:
    notify-failure:
      runs-on: ubuntu-latest
      steps:
        - run: ./page-oncall.sh
  on-abort:
    notify-abort:
      runs-on: ubuntu-latest
      steps:
        - run: ./notify-cancelled.sh
