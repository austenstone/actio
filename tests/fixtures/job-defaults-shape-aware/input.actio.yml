name: Job defaults shape aware
on: [push]

job-defaults:
  permissions:
    contents: read
  concurrency: ci-${{ github.ref }}

jobs:
  override-shapes:
    runs-on: ubuntu-latest
    permissions: write-all
    concurrency:
      group: custom
      cancel-in-progress: true
    steps:
      - run: echo one
  inherited:
    runs-on: ubuntu-latest
    steps:
      - run: echo two

