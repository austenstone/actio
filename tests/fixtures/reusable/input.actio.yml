name: Reusable
on:
  push:
    branches: [main]
reusable:
  inputs:
    environment:
      type: string
      required: true
      description: Target environment
    verbose:
      type: boolean
      default: false
  secrets:
    deploy-token:
      required: true
  outputs:
    url:
      description: Deployed URL
      value: ${{ jobs.deploy.outputs.url }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.run.outputs.url }}
    steps:
      - id: run
        run: |
          echo "deploying to ${{ github.event.inputs.environment }}"
          echo "verbose=${{ github.event.inputs.verbose }}"
          echo "snapshot=${{ toJSON(github.event.inputs) }}"
          echo "literal ${{ 'github.event.inputs.kept' }}"
