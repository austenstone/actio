name: Precedence
on: [push]

job-defaults:
  if: ${{ github.ref == 'refs/heads/main' }}
  permissions:
    contents: read

call-templates:
  test:
    uses: ./.github/workflows/reuse.yml
    if: ${{ github.event_name == 'push' }}
    with:
      region: us-east-1
      tier: base

jobs:
  from-template:
    extends: test
    with:
      tier: gold
  inline-wins:
    extends: test
    if: ${{ success() }}
    with:
      region: eu-west-1
      tier: gold
