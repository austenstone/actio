name: Anchors Flatten
on: [push]
_anchors:
  setup: &setup
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
  lint: &lint
    - run: npm run lint
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - *setup
      - run: npm ci
      - *lint
      - run: npm run build
