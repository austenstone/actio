name: Release
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        run: VERSION=$(jq -r .version package.json)
        share:
          version: $VERSION
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: npm publish --tag v${{ share.version }}
