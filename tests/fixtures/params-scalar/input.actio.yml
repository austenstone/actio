name: Params Scalar
on: [push]
params:
  tag:
    type: string
    default: v1.2.3
  retries:
    type: number
    default: 3
  dry_run:
    type: boolean
    default: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "tag={{ params.tag }} retries={{ params.retries }} dry={{ params.dry_run }}"
