name: CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: ./build.sh
  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - run: ./test.sh
  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - run: ./deploy.sh

finally:
  on_failure:
    triage:
      runs-on: ubuntu-latest
      when: deploy.failed
      steps:
        - run: ./triage.sh ${{ needs.deploy.result }}
