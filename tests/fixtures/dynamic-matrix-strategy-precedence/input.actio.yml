name: Dynamic Matrix Strategy Precedence
on: [push]
jobs:
  inline_wins:
    runs-on: ubuntu-latest
    dynamic-matrix:
      alias: shard
      script: echo '["x"]'
    strategy:
      matrix:
        keep: [manual]
      fail-fast: true
    steps:
      - run: echo ${{ matrix.keep }}
  dynamic_matrix:
    runs-on: ubuntu-latest
    dynamic-matrix:
      alias: shard
      script: echo '["y"]'
    steps:
      - run: echo ${{ matrix.shard }}
