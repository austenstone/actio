name: CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: ./build.sh
  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - run: ./test.sh

finally:
  teardown:
    runs-on: ubuntu-latest
    steps:
      - run: ./stop-resources.sh
  on_abort:
    teardown-cancelled:
      runs-on: ubuntu-latest
      steps:
        - run: ./stop-resources.sh
        - run: ./notify.sh "run cancelled"
