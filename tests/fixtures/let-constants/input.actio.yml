name: Let Constants
on: [push]
params:
  base:
    type: number
    default: 4
let:
  doubled: "{{ params.base * 2 }}"
  label: "build-{{ let.doubled }}"
  tier: "{{ let.doubled > 6 ? 'big' : 'small' }}"
defaults:
  run:
    shell: "{{ let.label }}-{{ let.tier }}"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo hi
