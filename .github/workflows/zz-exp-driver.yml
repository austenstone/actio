# TEMPORARY experiment: does `if: false` on a `uses:` caller still cause GitHub
# to validate the referenced reusable workflow at run-graph build time?
#   - run conclusion == startup_failure  => YES, validated despite if:false
#   - run conclusion == success (sentinel) => NO, if:false skips validation
name: zz-exp
on:
  push:
    paths:
      - .github/workflows/zz-exp-*.yml
  workflow_dispatch:
permissions:
  contents: read
jobs:
  callee:
    if: false
    uses: ./.github/workflows/zz-exp-callee-bad.yml

  sentinel:
    runs-on: ubuntu-latest
    steps:
      - run: echo "sentinel ran -> NO startup_failure -> if:false skipped validation"
