# yaml-language-server: $schema=https://raw.githubusercontent.com/austenstone/actio/main/packages/core/schema/actio.schema.json

# E2E: dynamic_matrix runs a setup script that emits JSON, then fans the
# downstream job out over the result. Each shard asserts its value; a collector
# asserts every shard succeeded.
name: E2E Dynamic Matrix
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shards:
    runs-on: ubuntu-latest
    dynamic_matrix:
      alias: shard
      checkout: false
      script: |
        echo '["alpha","beta","gamma"]'
    steps:
      - name: Assert shard value
        run: |
          case "${{ matrix.shard }}" in
            alpha|beta|gamma) echo "ok shard: ${{ matrix.shard }}" ;;
            *) echo "unexpected shard: ${{ matrix.shard }}"; exit 1 ;;
          esac

  collect:
    runs-on: ubuntu-latest
    needs: [shards]
    if: always()
    steps:
      - name: Assert all shards passed
        run: |
          test "${{ needs.shards.result }}" = "success"
          echo "dynamic matrix verified: fan-out expanded and every shard ran green"
