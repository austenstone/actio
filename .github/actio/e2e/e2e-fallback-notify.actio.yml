# yaml-language-server: $schema=https://raw.githubusercontent.com/austenstone/actio/main/packages/core/schema/actio.schema.json

# E2E: job-level / notify fallback runs on failure via if: failure().
# The guarded step still fails, so the job is allowed to fail
# (continue-on-error) while a downstream assert job confirms the fallback fired.
name: E2E Fallback Notify
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      notified: ${{ steps.notify.outputs.notified }}
    steps:
      - name: Deploy
        run: exit 1
        fallback:
          - name: Notify
            id: notify
            run: echo "notified=yes" >> "$GITHUB_OUTPUT"

  assert:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Assert fallback fired
        run: |
          test "${{ needs.deploy.outputs.notified }}" = "yes"
          echo "fallback notify verified: failure path ran the notify step"
