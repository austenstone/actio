# yaml-language-server: $schema=https://raw.githubusercontent.com/austenstone/actio/main/packages/core/schema/actio.schema.json

# E2E: build-time sugar. params interpolate into run scripts, static_if keeps or
# drops steps at compile time. The dropped step would exit 1 if it were wrongly
# kept, so a green run proves the compile-time branch resolved correctly.
name: E2E When + Params
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

params:
  greeting:
    type: string
    default: hello-from-actio
  keep_step:
    type: boolean
    default: true
  drop_step:
    type: boolean
    default: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Assert param interpolation
        run: |
          test "{{ params.greeting }}" = "hello-from-actio"
          echo "params verified: greeting interpolated at build time"
      - name: Kept by static_if
        static_if: params.keep_step
        run: echo "kept step ran (static_if true)"
      - name: Dropped by static_if
        static_if: params.drop_step
        run: exit 1
