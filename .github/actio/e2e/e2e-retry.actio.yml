# yaml-language-server: $schema=https://raw.githubusercontent.com/austenstone/actio/main/packages/core/schema/actio.schema.json

# E2E: retry must physically re-run a failing step.
# Attempt 1 drops a marker and fails; attempt 2 sees the marker and passes.
name: E2E Retry
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Flaky
        retry:
          attempts: 2
        run: |
          marker="$RUNNER_TEMP/actio-retry-marker"
          if [ -f "$marker" ]; then
            echo "marker present -> attempt succeeds"
            exit 0
          fi
          echo "no marker -> create it and fail this attempt"
          touch "$marker"
          exit 1
      - name: Assert retry re-ran
        run: |
          test "${{ steps.step_flaky_attempt_1.outcome }}" = "failure"
          test "${{ steps.step_flaky_attempt_2.outcome }}" = "success"
          echo "retry verified: attempt 1 failed, attempt 2 succeeded"
