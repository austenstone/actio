# yaml-language-server: $schema=https://raw.githubusercontent.com/austenstone/actio/main/packages/core/schema/actio.schema.json

# E2E driver: compiles + runs the self-asserting reusable workflows on real
# GitHub Actions. This is the behavioral truth tier for Actio's runtime sugar.
name: E2E
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
  pull_request:
    paths:
      - packages/core/**
      - packages/cli/**
      - .github/actio/e2e/**
      - .github/workflows/e2e*

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify generated workflows are up to date
        run: npm run check:workflows

  retry:
    needs: check
    uses: ./.github/workflows/e2e-retry.yml

  fallback_recover:
    needs: check
    uses: ./.github/workflows/e2e-fallback-recover.yml

  fallback_notify:
    needs: check
    uses: ./.github/workflows/e2e-fallback-notify.yml

  dynamic_matrix:
    needs: check
    uses: ./.github/workflows/e2e-dynamic-matrix.yml

  fragments_executors:
    needs: check
    uses: ./.github/workflows/e2e-fragments-executors.yml

  when_params:
    needs: check
    uses: ./.github/workflows/e2e-when-params.yml

  result:
    runs-on: ubuntu-latest
    needs:
      - check
      - retry
      - fallback_recover
      - fallback_notify
      - dynamic_matrix
      - fragments_executors
      - when_params
    if: always()
    steps:
      - name: Assert all e2e fixtures passed
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "$results"
          test "$(echo "$results" | jq 'all(. == "success")')" = "true"
          echo "all e2e fixtures green"
